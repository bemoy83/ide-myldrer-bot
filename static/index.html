<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Idé-myldrer">
  <meta name="theme-color" content="#1a1612">
  <link rel="manifest" href="/static/manifest.json">
  <title>Idé-myldrer</title>
  <style>
    :root {
      --parchment: #f8f5e0;
      --mint: #1cd4a7;
      --chassis: #d8d4c4;
      --sys7-blue: #d1e8ff;
      --ink: #1a1612;
      --rainbow: linear-gradient(to right,#61bb46,#fdbd2c,#f58220,#e03a3e,#963d97,#009ddc);
    }
    *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--chassis);
      background-image: radial-gradient(#c8c4b4 1px, transparent 1px);
      background-size: 16px 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 3rem;
      color: var(--ink);
    }

    /* Boot splash */
    #splash {
      position: fixed; inset: 0; background: #000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 1.5rem;
      z-index: 1000; transition: opacity 0.5s;
    }
    #splash.hidden { opacity: 0; pointer-events: none; }
    #splash p {
      font-family: ui-monospace,'SF Mono',Menlo,monospace;
      color: #fff; font-size: 0.95rem; letter-spacing: 0.12em;
    }

    /* Main window */
    #window {
      width: 100%; max-width: 640px;
      border: 2px solid var(--ink);
      box-shadow: 0 0 0 1px var(--ink), 6px 6px 0 0 rgba(0,0,0,0.15);
      animation: crt-boot 1s cubic-bezier(0.23,1,0.32,1) forwards;
    }
    @keyframes crt-boot {
      0%   { opacity:0; transform:scaleY(0.005) scaleX(0); filter:brightness(4); }
      3%   { opacity:1; transform:scaleY(0.005) scaleX(1); filter:brightness(4); }
      8%   { transform:scaleY(1) scaleX(1); filter:brightness(2); }
      14%  { filter:brightness(1.4); }
      16%  { filter:brightness(1); }
    }

    .rainbow-strip { height: 5px; background: var(--rainbow); }

    .title-bar {
      height: 30px; border-bottom: 2px solid var(--ink);
      background: var(--parchment);
      display: flex; align-items: center; padding: 0 6px; gap: 5px;
    }
    .close-box {
      width: 16px; height: 16px; border: 2px solid var(--ink);
      background: #fff; cursor: pointer; flex-shrink: 0;
    }
    .close-box:hover { background: #eee; }
    .title-stripes {
      flex: 1; height: 10px;
      background: repeating-linear-gradient(0deg,var(--ink) 0,var(--ink) 1px,transparent 1px,transparent 2px);
      opacity: 0.25;
    }
    .title-text {
      font-family: ui-monospace,'SF Mono',Menlo,monospace;
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.2em; padding: 0 8px; white-space: nowrap;
    }

    /* Chat */
    #chat {
      min-height: 180px; max-height: 62vh;
      overflow-y: auto;
      padding: 1.4rem 1.2rem;
      display: flex; flex-direction: column; gap: 1.4rem;
      background-color: var(--parchment);
      background-image: repeating-linear-gradient(
        45deg,#e0ddd0 0,#e0ddd0 1px,transparent 1px,transparent 4px
      );
    }
    #chat::-webkit-scrollbar { width: 15px; }
    #chat::-webkit-scrollbar-track {
      background: var(--chassis); border-left: 1px solid var(--ink);
    }
    #chat::-webkit-scrollbar-thumb { background: #fff; border: 1px solid var(--ink); }

    /* Bot row */
    .bot-row { display: flex; gap: 0.7rem; align-items: flex-start; }

    .mac-avatar { flex-shrink: 0; width: 44px; }

    .bot-content { flex: 1; }
    .bubble-label {
      font-family: ui-monospace,'SF Mono',Menlo,monospace;
      font-size: 8px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.1em; margin-bottom: 4px; opacity: 0.6;
    }
    .bot-bubble-inner {
      border: 2px solid var(--ink); background: #fff;
      padding: 0.9rem 1rem;
      box-shadow: 3px 3px 0 0 rgba(0,0,0,0.07);
    }
    .question-text { font-size: 1rem; line-height: 1.5; margin-bottom: 0.8rem; }

    .options { display: flex; flex-direction: column; gap: 0.35rem; }
    .option-btn {
      background: #fff; border: 2px solid var(--ink); color: var(--ink);
      cursor: pointer;
      font-family: ui-monospace,'SF Mono',Menlo,monospace;
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.04em; padding: 0.55rem 0.8rem; text-align: left;
      box-shadow: 1px 1px 0 0 var(--ink);
      transition: background 0.05s, transform 0.05s, box-shadow 0.05s;
    }
    .option-btn:not(:disabled):hover { background: var(--mint); }
    .option-btn:active:not(:disabled) { box-shadow: inset 1px 1px 0 0 var(--ink); transform: translate(1px,1px); }
    .option-btn:disabled { opacity: 0.4; cursor: default; box-shadow: none; transform: none; }
    @keyframes cascade-in {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .option-btn.cascade { opacity: 0; }
    .option-btn.cascade.visible { animation: cascade-in 0.2s ease-out; opacity: 1; }
    .option-btn.cascade.visible:disabled { opacity: 0.4; }

    /* User bubble */
    .user-row { display: flex; justify-content: flex-end; }
    .user-bubble { max-width: 75%; }
    .user-bubble .bubble-label { text-align: right; }
    .user-bubble-inner {
      border: 2px solid var(--ink); background: var(--sys7-blue);
      padding: 0.7rem 0.9rem; font-weight: 600;
      box-shadow: 3px 3px 0 0 rgba(0,0,0,0.07);
    }

    /* Summary */
    .summary-header {
      font-family: ui-monospace,'SF Mono',Menlo,monospace;
      font-size: 9px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.15em; margin-bottom: 0.7rem;
      padding-bottom: 0.5rem; border-bottom: 2px solid var(--ink);
      display: flex; align-items: center; justify-content: space-between;
    }
    .rainbow-dot {
      width: 9px; height: 9px; border: 1px solid var(--ink);
      animation: rainbow-cycle 5s linear infinite;
    }
    @keyframes rainbow-cycle {
      0%{background:#61bb46} 20%{background:#fdbd2c}
      40%{background:#f58220} 60%{background:#e03a3e}
      80%{background:#963d97} 100%{background:#009ddc}
    }
    .ideas { display: flex; flex-direction: column; gap: 0.4rem; }
    .idea {
      display: flex; align-items: flex-start; gap: 0.65rem;
      padding: 0.5rem 0.4rem; border: 1px solid transparent;
    }
    .idea-folder {
      flex-shrink: 0; width: 20px; height: 16px;
      border: 2px solid var(--ink); background: #fff; position: relative; margin-top: 6px;
    }
    .idea-folder::before {
      content:''; position: absolute; top: -5px; left: 0;
      width: 9px; height: 5px; border: 2px solid var(--ink); border-bottom: none;
      background: var(--folder-color, #fff);
    }
    .idea-folder::after {
      content:''; position: absolute; inset: 0;
      background: var(--folder-color, transparent); opacity: 0.35;
    }
    .idea-title {
      font-family: ui-monospace,'SF Mono',Menlo,monospace;
      font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em;
    }
    .idea-desc { color: #555; font-size: 0.85rem; line-height: 1.4; margin-top: 2px; }

    .summary-hint {
      margin-top: 0.7rem;
      font-family: ui-monospace,'SF Mono',Menlo,monospace;
      font-size: 8px; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--ink); opacity: 0.4;
    }

    .export-bar { display: flex; gap: 0.4rem; margin-top: 0.7rem; }
    .export-btn {
      background: #fff; border: 2px solid var(--ink); color: var(--ink);
      cursor: pointer;
      font-family: ui-monospace,'SF Mono',Menlo,monospace;
      font-size: 9px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.04em; padding: 0.35rem 0.7rem;
      box-shadow: 1px 1px 0 0 var(--ink); transition: background 0.05s;
    }
    .export-btn:hover { background: var(--mint); }
    .export-btn.copied { background: var(--mint); }

    /* Freeform */
    .freeform-inner {
      border: 2px solid var(--ink); background: #fff;
      padding: 0.9rem 1rem; white-space: pre-wrap;
      font-size: 0.95rem; line-height: 1.6;
      box-shadow: 3px 3px 0 0 rgba(0,0,0,0.07);
    }

    /* Input area */
    #input-area {
      border-top: 2px solid var(--ink);
      background: var(--chassis); padding: 0.8rem 1rem;
    }
    #status {
      font-family: ui-monospace,'SF Mono',Menlo,monospace;
      font-size: 8px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.12em; opacity: 0.5; min-height: 12px; margin-bottom: 0.4rem;
    }
    .input-wrap {
      position: relative; border: 2px solid var(--ink); background: #fff;
      display: flex; align-items: stretch;
      box-shadow: 3px 3px 0 0 rgba(0,0,0,0.08); margin-bottom: 0.6rem;
    }
    .input-prefix {
      font-family: ui-monospace,'SF Mono',Menlo,monospace;
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.1em; border-right: 2px solid var(--ink);
      padding: 0.65rem 0.7rem; background: var(--parchment);
      display: flex; align-items: center; flex-shrink: 0;
    }
    #freetext {
      flex: 1; background: transparent; border: none; outline: none;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      font-size: 0.95rem; padding: 0.65rem 0.7rem; resize: none; color: var(--ink);
    }
    #freetext::placeholder { color: rgba(26,22,18,0.3); }
    .marching-ants {
      position: absolute; inset: 0; pointer-events: none; opacity: 0;
      background-image: repeating-linear-gradient(45deg,var(--ink) 0.5px,transparent 0.5px,transparent 2px);
      background-size: 8px 8px; animation: march 0.5s linear infinite; transition: opacity 0.2s;
    }
    .marching-ants.active { opacity: 0.12; }
    @keyframes march { from{background-position:0 0} to{background-position:16px 16px} }

    .action-row { display: flex; justify-content: space-between; align-items: center; gap: 0.4rem; }
    .left-actions { display: flex; gap: 0.4rem; align-items: center; }
    .right-actions { display: flex; gap: 0.4rem; align-items: center; }
    .depth-label {
      font-family: ui-monospace,'SF Mono',Menlo,monospace;
      font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.5;
    }
    .depth-select {
      background: #fff; border: 2px solid var(--ink); color: var(--ink);
      font-family: ui-monospace,'SF Mono',Menlo,monospace;
      font-size: 9px; font-weight: 700; padding: 2px 5px;
      appearance: none; cursor: pointer;
    }
    .mac-btn {
      background: #fff; border: 2px solid var(--ink); color: var(--ink);
      cursor: pointer;
      font-family: ui-monospace,'SF Mono',Menlo,monospace;
      font-size: 9px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.05em; padding: 0.45rem 0.9rem;
      box-shadow: 2px 2px 0 0 var(--ink);
      transition: transform 0.05s, box-shadow 0.05s, background 0.05s;
    }
    .mac-btn:hover { background: #f0ede0; }
    .mac-btn:active { box-shadow: inset 1px 1px 0 0 var(--ink); transform: translate(1px,1px); }
    .mac-btn:disabled { opacity: 0.35; cursor: default; box-shadow: 1px 1px 0 0 var(--ink); }
    .mac-btn.primary { background: var(--mint); }
    .mac-btn.primary:hover { background: #12c498; }
    .mac-btn.primary:disabled { background: #ccc; }
    .mac-btn.danger { color: #b03030; border-color: #b03030; box-shadow: 2px 2px 0 0 #b03030; }

    @keyframes heartbeat {
      0%,100% { transform: scale(1); }
      30%      { transform: scale(1.18); }
      50%      { transform: scale(1.08); }
      70%      { transform: scale(1.18); }
    }
    .mac-avatar.pulsing svg { animation: heartbeat 1.2s ease-in-out infinite; transform-origin: center bottom; }

    #empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 0.8rem;
      padding: 2.5rem 1.5rem; text-align: center;
    }
    #empty-state.hidden { display: none; }
    .empty-greeting {
      font-family: ui-monospace,'SF Mono',Menlo,monospace;
      font-size: 0.85rem; font-weight: 700; color: var(--ink);
    }
    .empty-hint {
      font-size: 0.82rem; line-height: 1.5; color: #666; max-width: 320px;
    }

    @media (prefers-reduced-motion: reduce) {
      .rainbow-dot, .marching-ants { animation: none !important; }
      .mac-avatar.pulsing svg { animation: none !important; }
      #window { animation: none; }
    }
    @media (max-width: 600px) {
      body { padding: 0; }
      #window { max-width: 100%; border-left: none; border-right: none; border-top: none; box-shadow: none; }
      #chat { max-height: calc(100vh - 185px); padding-bottom: 0; }
      #input-area {
        position: fixed; bottom: 0; left: 0; right: 0; z-index: 10; border-top: 2px solid var(--ink);
        padding-bottom: calc(0.8rem + env(safe-area-inset-bottom));
      }
      .option-btn { padding: 0.75rem 0.8rem; font-size: 11px; }
    }
  </style>
</head>
<body>

  <!-- Boot splash -->
  <div id="splash">
    <svg width="80" viewBox="0 0 58 68" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="2" y="2" width="54" height="64" rx="5" fill="#ede8d6" stroke="#fff" stroke-width="3"/>
      <rect x="7" y="7" width="44" height="32" rx="1.5" fill="#0e0d09"/>
      <rect x="13" y="11" width="8" height="11" rx="1" fill="white"/>
      <rect x="37" y="11" width="8" height="11" rx="1" fill="white"/>
      <path d="M 15 28 Q 29 38 43 28" stroke="white" stroke-width="3" stroke-linecap="round" fill="none"/>
      <rect x="14" y="46" width="30" height="5" rx="2" fill="#fff"/>
    </svg>
    <p>Welcome to Macintosh</p>
  </div>

  <div id="window">
    <div class="rainbow-strip"></div>
    <div class="title-bar">
      <div class="close-box" onclick="resetSession()"></div>
      <div class="title-stripes"></div>
      <div class="title-text">Idé-myldrer v1.0</div>
      <div class="title-stripes"></div>
    </div>

    <div id="chat">
      <div id="empty-state">
        <div id="empty-avatar"></div>
        <p class="empty-greeting">Hei! Jeg er klar til å hjelpe deg myldre frem nye ideer.</p>
        <p class="empty-hint">Beskriv et tema, en utfordring eller bare noe du er nysgjerrig på — så tar vi det derfra.</p>
      </div>
    </div>

    <div id="input-area">
      <div id="status"></div>
      <div class="input-wrap">
        <div class="marching-ants" id="marchingAnts"></div>
        <div class="input-prefix">Prompt</div>
        <textarea id="freetext" rows="2" placeholder="Type or click to continue..."></textarea>
      </div>
      <div class="action-row">
        <div class="left-actions">
          <button class="mac-btn" id="reset-btn" onclick="resetSession()"><span style="font-size:13px">↺</span> Re-Init</button>
          <button class="mac-btn danger" id="retry-btn" style="display:none">⚠ Retry</button>
        </div>
        <div class="right-actions">
          <span class="depth-label">Dybde</span>
          <select class="depth-select" id="max-q-select">
            <option value="2">2</option>
            <option value="3" selected>3</option>
            <option value="4">4</option>
            <option value="5">5</option>
          </select>
          <button class="mac-btn primary" id="send-btn">Execute <span style="font-size:13px">›</span></button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const HAPPY_MAC = `<svg width="44" viewBox="0 0 58 68" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="2" y="2" width="54" height="64" rx="5" fill="#ede8d6" stroke="#1a1612" stroke-width="3"/>
      <rect x="7" y="7" width="44" height="32" rx="1.5" fill="#0e0d09"/>
      <rect x="13" y="11" width="8" height="11" rx="1" fill="white"/>
      <rect x="37" y="11" width="8" height="11" rx="1" fill="white"/>
      <path d="M 15 28 Q 29 38 43 28" stroke="white" stroke-width="3" stroke-linecap="round" fill="none"/>
      <rect x="14" y="46" width="30" height="5" rx="2" fill="#1a1612"/>
    </svg>`;

    const SAD_MAC = `<svg width="44" viewBox="0 0 58 68" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="2" y="2" width="54" height="64" rx="5" fill="#ede8d6" stroke="#1a1612" stroke-width="3"/>
      <rect x="7" y="7" width="44" height="32" rx="1.5" fill="#1a0505"/>
      <path d="M13 11 L21 22 M21 11 L13 22" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M37 11 L45 22 M45 11 L37 22" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M 15 36 Q 29 26 43 36" stroke="white" stroke-width="3" stroke-linecap="round" fill="none"/>
      <rect x="14" y="46" width="30" height="5" rx="2" fill="#1a1612"/>
    </svg>`;

    let state = { history: [], question_count: 0, phase: "questioning", max_questions: 3 };
    let busy = false;
    let lastAnswer = null;
    let pendingRow = null;

    const chatEl = document.getElementById("chat");
    const emptyState = document.getElementById("empty-state");
    document.getElementById("empty-avatar").innerHTML = HAPPY_MAC;
    const freetextEl = document.getElementById("freetext");
    const sendBtn = document.getElementById("send-btn");
    const retryBtn = document.getElementById("retry-btn");
    const maxQSelect = document.getElementById("max-q-select");
    const statusEl = document.getElementById("status");
    const marchingAnts = document.getElementById("marchingAnts");

    function makeBotRow() {
      const row = document.createElement("div");
      row.className = "bot-row";

      const avatar = document.createElement("div");
      avatar.className = "mac-avatar";
      avatar.innerHTML = HAPPY_MAC;
      row.appendChild(avatar);

      const content = document.createElement("div");
      content.className = "bot-content";
      const label = document.createElement("div");
      label.className = "bubble-label";
      label.textContent = "System Output";
      content.appendChild(label);
      row.appendChild(content);
      return { row, avatar, content };
    }

    function addQuestionBubble(response) {
      const { avatar, content } = pendingRow;
      avatar.classList.remove("pulsing");
      pendingRow = null;
      const inner = document.createElement("div");
      inner.className = "bot-bubble-inner";
      const q = document.createElement("p");
      q.className = "question-text";
      inner.appendChild(q);
      const opts = document.createElement("div");
      opts.className = "options";
      const btns = response.options.map(opt => {
        const btn = document.createElement("button");
        btn.className = "option-btn cascade";
        btn.textContent = opt;
        btn.addEventListener("click", () => { markSelected(inner, btn); sendAnswer(opt); });
        opts.appendChild(btn);
        return btn;
      });
      inner.appendChild(opts);
      typewriter(q, response.question, () => {
        btns.forEach((btn, i) => {
          setTimeout(() => btn.classList.add("visible"), i * 100);
        });
      });
      content.appendChild(inner);
    }

    function addSummaryBubble(response) {
      const { avatar, content } = pendingRow;
      avatar.classList.remove("pulsing");
      pendingRow = null;
      const inner = document.createElement("div");
      inner.className = "bot-bubble-inner";

      const header = document.createElement("div");
      header.className = "summary-header";
      header.innerHTML = `<span>Forslag</span><div class="rainbow-dot"></div>`;
      inner.appendChild(header);

      const ideas = document.createElement("div");
      ideas.className = "ideas";
      const folderColors = ["#e03a3e","#f58220","#fdbd2c","#61bb46","#009ddc","#963d97"];
      response.ideas.forEach((idea, i) => {
        const item = document.createElement("div");
        item.className = "idea";
        const folder = document.createElement("div");
        folder.className = "idea-folder";
        folder.style.setProperty("--folder-color", folderColors[i % folderColors.length]);
        const text = document.createElement("div");
        const title = document.createElement("div");
        title.className = "idea-title";
        title.textContent = idea.title;
        const desc = document.createElement("div");
        desc.className = "idea-desc";
        desc.textContent = idea.description;
        text.appendChild(title);
        text.appendChild(desc);
        item.appendChild(folder);
        item.appendChild(text);
        ideas.appendChild(item);
      });
      inner.appendChild(ideas);

      const hint = document.createElement("p");
      hint.className = "summary-hint";
      hint.textContent = "Vil du utforske videre? Skriv fritt eller still et oppfølgingsspørsmål.";
      inner.appendChild(hint);

      const bar = document.createElement("div");
      bar.className = "export-bar";
      const copyBtn = document.createElement("button");
      copyBtn.className = "export-btn";
      copyBtn.textContent = "⎘ Copy .md";
      copyBtn.addEventListener("click", () => {
        navigator.clipboard.writeText(toMarkdown(response.ideas)).then(() => {
          copyBtn.textContent = "✓ Copied!";
          copyBtn.classList.add("copied");
          setTimeout(() => { copyBtn.textContent = "⎘ Copy .md"; copyBtn.classList.remove("copied"); }, 2000);
        });
      });
      const dlBtn = document.createElement("button");
      dlBtn.className = "export-btn";
      dlBtn.textContent = "💾 Save to Disk";
      dlBtn.addEventListener("click", () => {
        const blob = new Blob([toMarkdown(response.ideas)], { type: "text/markdown" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "ideer-" + new Date().toISOString().slice(0,10) + ".md";
        a.click();
        URL.revokeObjectURL(a.href);
      });
      bar.appendChild(copyBtn);
      bar.appendChild(dlBtn);
      inner.appendChild(bar);
      content.appendChild(inner);
    }

    function addFreeformBubble(text) {
      const { avatar, content } = pendingRow;
      avatar.classList.remove("pulsing");
      pendingRow = null;
      const inner = document.createElement("div");
      inner.className = "freeform-inner";
      content.appendChild(inner);
      typewriter(inner, text);
    }

    function addUserBubble(text) {
      emptyState?.classList.add("hidden");
      const row = document.createElement("div");
      row.className = "user-row";
      const wrap = document.createElement("div");
      wrap.className = "user-bubble";
      const label = document.createElement("div");
      label.className = "bubble-label";
      label.textContent = "Bruker-input";
      const inner = document.createElement("div");
      inner.className = "user-bubble-inner";
      inner.textContent = text;
      wrap.appendChild(label);
      wrap.appendChild(inner);
      row.appendChild(wrap);
      chatEl.appendChild(row);
    }

    function toMarkdown(ideas) {
      const date = new Date().toLocaleDateString("no-NO", { dateStyle: "long" });
      const lines = ["# Idé-myldrer — forslag", "", `_Generert ${date}_`, ""];
      ideas.forEach((idea, i) => { lines.push(`## ${i + 1}. ${idea.title}`, idea.description, ""); });
      return lines.join("\n");
    }

    function typewriter(el, text, onDone, speed = 18) {
      if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
        el.textContent = text;
        onDone?.();
        return;
      }
      let i = 0;
      el.textContent = "";
      const tick = () => {
        el.textContent += text[i++];
        if (i < text.length) setTimeout(tick, speed);
        else onDone?.();
      };
      setTimeout(tick, speed);
    }

    function markSelected(el, selected) {
      el.querySelectorAll(".option-btn").forEach(b => {
        b.disabled = true;
        if (b === selected) b.style.background = "var(--mint)";
      });
    }
    function disableAllOptions() { chatEl.querySelectorAll(".option-btn").forEach(b => b.disabled = true); }

    function setLoading(on) {
      busy = on;
      sendBtn.disabled = on;
      freetextEl.disabled = on;
      marchingAnts.classList.toggle("active", on);
      statusEl.textContent = on ? "COMPUTING..." : "";
      retryBtn.style.display = "none";
      if (on) {
        const { row, avatar, content } = makeBotRow();
        avatar.classList.add("pulsing");
        chatEl.appendChild(row);
        row.scrollIntoView({ behavior: "smooth", block: "end" });
        pendingRow = { row, avatar, content };
      } else if (pendingRow) {
        pendingRow.row.remove();
        pendingRow = null;
      }
    }

    function showError(msg) {
      statusEl.textContent = "ERROR: " + msg;
      retryBtn.style.display = "inline-block";
      if (pendingRow) {
        pendingRow.avatar.innerHTML = SAD_MAC;
        pendingRow.avatar.classList.remove("pulsing");
        pendingRow = null;
      }
    }

    async function sendAnswer(answer) {
      if (busy || !answer.trim()) return;
      lastAnswer = answer;
      addUserBubble(answer);
      setLoading(true);
      freetextEl.value = "";

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ ...state, user_answer: answer }),
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          showError(err.detail || res.status);
          setLoading(false);
          return;
        }
        const data = await res.json();
        state = { history: data.history, question_count: data.question_count, phase: data.phase, max_questions: data.max_questions };
        if (data.response.type === "question") addQuestionBubble(data.response);
        else if (data.response.type === "summary") addSummaryBubble(data.response);
        else if (data.response.type === "freeform") addFreeformBubble(data.response.text);
        chatEl.lastElementChild?.scrollIntoView({ behavior: "smooth", block: "end" });
      } catch (e) {
        showError(e.message);
      }
      setLoading(false);
    }

    function resetSession() {
      state = { history: [], question_count: 0, phase: "questioning", max_questions: parseInt(maxQSelect.value, 10) };
      chatEl.innerHTML = "";
      emptyState.classList.remove("hidden");
      chatEl.appendChild(emptyState);
      freetextEl.value = "";
      statusEl.textContent = "";
      retryBtn.style.display = "none";
      lastAnswer = null;
      pendingRow = null;
      marchingAnts.classList.remove("active");
      freetextEl.focus();
    }

    sendBtn.addEventListener("click", () => sendAnswer(freetextEl.value));
    freetextEl.addEventListener("keydown", e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendAnswer(freetextEl.value); } });
    retryBtn.addEventListener("click", () => { if (lastAnswer) sendAnswer(lastAnswer); });
    maxQSelect.addEventListener("change", () => { state.max_questions = parseInt(maxQSelect.value, 10); });

    window.addEventListener("load", () => {
      setTimeout(() => {
        document.getElementById("splash").classList.add("hidden");
        setTimeout(() => { document.getElementById("splash").remove(); freetextEl.focus(); }, 500);
      }, 1500);
      if ("serviceWorker" in navigator) navigator.serviceWorker.register("/static/sw.js");
    });
  </script>
</body>
</html>
